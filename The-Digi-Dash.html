<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEON OPS // CRUZ DASHBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080d;--bg-card:#0c0e15;--bg-card-h:#111420;
  --border:rgba(255,255,255,0.055);--border-h:rgba(249,115,22,0.35);
  --orange:#f97316;--cyan:#22d3ee;
  --text:#b8c1cc;--text-dim:#4e5a6a;--text-bright:#eaf0f6;
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;--purple:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(249,115,22,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,0.022) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:1000px;height:520px;background:radial-gradient(ellipse at 50% 0%,rgba(249,115,22,0.065) 0%,transparent 65%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1520px;margin:0 auto;padding:20px 26px 60px;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:13px;}
.fox{width:32px;height:32px;flex-shrink:0;background:var(--orange);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;letter-spacing:0.18em;color:var(--text-bright);line-height:1;}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--orange);letter-spacing:0.32em;text-transform:uppercase;margin-top:3px;}
.clock-block{text-align:right;}
.clock-time{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:300;color:var(--text-bright);letter-spacing:0.04em;line-height:1;}
.clock-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:0.22em;text-transform:uppercase;margin-top:4px;}

/* SEARCH */
.search-wrap{margin-bottom:14px;position:relative;}
.search-input{width:100%;padding:11px 16px 11px 42px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text-bright);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-input::placeholder{color:var(--text-dim);}
.search-input:focus{border-color:rgba(249,115,22,.5);box-shadow:0 0 0 3px rgba(249,115,22,.07);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;pointer-events:none;font-family:'JetBrains Mono',monospace;}
.search-kbd{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.1em;pointer-events:none;}

/* PINNED */
.pinned-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--orange);margin-bottom:7px;display:flex;align-items:center;gap:8px;}
.pinned-label::after{content:'';flex:1;height:1px;background:rgba(249,115,22,0.2);}
.pinned-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;align-items:center;}
.pin-group{position:relative;display:inline-flex;}
.pin{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;text-decoration:none;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.06em;transition:background .15s,border-color .15s,color .15s;white-space:nowrap;cursor:pointer;}
.pin:hover{background:var(--bg-card-h);border-color:rgba(249,115,22,.3);color:var(--text-bright);}
.pin-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.pin-menu-btn{position:absolute;top:-5px;right:-5px;width:15px;height:15px;background:#1a1c28;border:1px solid var(--border);border-radius:50%;color:var(--text-dim);font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;line-height:1;padding:0;}
.pin-group:hover .pin-menu-btn{opacity:1;}
.pin-add{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.2);color:var(--orange);font-size:15px;padding:4px 13px;cursor:pointer;}
.pin-add:hover{background:rgba(249,115,22,.15);}

/* TABS */
.tabs{display:flex;gap:1px;margin-bottom:18px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.tab{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);padding:7px 13px 9px;cursor:pointer;border-bottom:2px solid transparent;position:relative;bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;transition:color .15s,border-color .15s;user-select:none;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}

/* SECTION HEADER */
.section-wrap{margin-bottom:24px;position:relative;}
.section-wrap.section-dragging{opacity:.35;}
.section-header{display:flex;align-items:center;gap:9px;margin-bottom:10px;cursor:default;}
.section-drag-handle{color:var(--text-dim);font-size:15px;cursor:grab;user-select:none;padding:2px 4px;border-radius:3px;transition:color .15s,background .15s;flex-shrink:0;line-height:1;}
.section-drag-handle:hover{color:var(--orange);background:rgba(249,115,22,.08);}
.section-drag-handle:active{cursor:grabbing;}
.sh-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-dim);white-space:nowrap;}
.sh-label.pri{color:var(--orange);font-size:10px;}
.sh-line{flex:1;height:1px;background:var(--border);}
.sh-line.pri{background:rgba(249,115,22,.2);}
.section-menu-btn{background:none;border:none;color:var(--text-dim);font-size:15px;cursor:pointer;padding:2px 6px;border-radius:3px;transition:color .15s,background .15s;flex-shrink:0;line-height:1;}
.section-menu-btn:hover{color:var(--text-bright);background:rgba(255,255,255,.06);}

/* CARDS */
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:5px;padding:11px 13px 12px;cursor:pointer;color:var(--text);transition:background .15s,border-color .18s,transform .12s;display:flex;flex-direction:column;position:relative;overflow:hidden;user-select:none;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--c-accent,var(--orange));opacity:0;transition:opacity .18s;}
.card:hover{background:var(--bg-card-h);border-color:rgba(249,115,22,.22);transform:translateY(-1px);}
.card:hover::before{opacity:1;}
.card.dragging{opacity:.25;transform:scale(.97);}
.card-icon{font-size:14px;margin-bottom:7px;line-height:1;}
.card-label{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;letter-spacing:.04em;color:var(--text-bright);line-height:1.2;}
.card-url-txt{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text-dim);margin-top:3px;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.card-badge{position:absolute;top:7px;right:26px;font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:500;letter-spacing:.1em;padding:2px 4px;border-radius:2px;text-transform:uppercase;}
.b-live{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.25);}
.b-fav{background:rgba(249,115,22,.12);color:var(--orange);border:1px solid rgba(249,115,22,.25);}
.b-wip{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.25);}

/* CARD THREE-DOT */
.card-menu-btn{position:absolute;top:6px;right:6px;width:20px;height:20px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s,background .15s,color .15s;z-index:2;line-height:1;padding:0;}
.card:hover .card-menu-btn{opacity:1;}
.card-menu-btn:hover{background:rgba(255,255,255,.1);color:var(--text-bright);}

/* ADD CARD TILE */
.add-card-tile{background:transparent;border:1px dashed rgba(255,255,255,.09);border-radius:5px;min-height:74px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:20px;font-weight:300;transition:border-color .15s,color .15s,background .15s;}
.add-card-tile:hover{border-color:rgba(249,115,22,.4);color:var(--orange);background:rgba(249,115,22,.05);}

/* DROP SLOTS */
.card-drop-slot{background:rgba(249,115,22,.12);border:1px dashed rgba(249,115,22,.4);border-radius:5px;min-height:74px;}
.section-drop-slot{height:3px;background:var(--orange);border-radius:2px;margin:6px 0;box-shadow:0 0 8px rgba(249,115,22,.5);}

/* ADD SECTION */
.add-section-btn{width:100%;padding:13px;margin-top:4px;background:transparent;border:1px dashed rgba(255,255,255,.07);border-radius:6px;cursor:pointer;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;transition:all .15s;}
.add-section-btn:hover{border-color:rgba(249,115,22,.35);color:var(--orange);background:rgba(249,115,22,.04);}

/* DROPDOWN */
.dropdown{position:fixed;z-index:1000;background:#13151f;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:4px;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.7);}
.dropdown.hidden{display:none;}
.dd-item{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:4px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;color:var(--text);transition:background .12s,color .12s;background:none;border:none;width:100%;text-align:left;}
.dd-item:hover{background:rgba(255,255,255,.07);color:var(--text-bright);}
.dd-item.danger:hover{background:rgba(248,113,113,.1);color:var(--red);}
.dd-sep{height:1px;background:var(--border);margin:4px 0;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:900;backdrop-filter:blur(3px);}
.modal-overlay.hidden{display:none;}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:901;background:#0f1019;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:26px;width:430px;max-width:calc(100vw - 28px);box-shadow:0 20px 60px rgba(0,0,0,.85);}
.modal.hidden{display:none;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;color:var(--text-bright);letter-spacing:.08em;margin-bottom:18px;}
.modal-field{margin-bottom:12px;}
.m-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;display:block;}
.m-input{width:100%;padding:8px 11px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;color:var(--text-bright);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
.m-input:focus{border-color:rgba(249,115,22,.5);}
.m-input::placeholder{color:var(--text-dim);}
.m-row{display:flex;gap:10px;}
.icon-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-top:5px;}
.icon-opt{height:30px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:13px;transition:all .12s;color:var(--text);}
.icon-opt:hover,.icon-opt.sel{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.4);color:var(--orange);}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.btn-cancel{padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;transition:all .15s;}
.btn-cancel:hover{border-color:rgba(255,255,255,.2);color:var(--text-bright);}
.btn-save{padding:8px 20px;background:var(--orange);border:none;border-radius:5px;color:#fff;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.08em;transition:background .15s;}
.btn-save:hover{background:#ea6c1a;}

/* FOOTER */
footer{margin-top:36px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.foot-sig{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.18em;}
.foot-sig span{color:var(--orange);}
.foot-reset{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.15em;cursor:pointer;background:none;border:none;transition:color .15s;}
.foot-reset:hover{color:var(--red);}

@media(max-width:900px){.wrap{padding:12px 12px 40px;}.section-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}.clock-time{font-size:20px;}}
</style>
</head>

function loadState(){try{const s=localStorage.getItem('aeon_ops_v3');state=s?JSON.parse(s):dc(DEFAULT_DATA);}catch(e){state=dc(DEFAULT_DATA);}}
function save(){localStorage.setItem('aeon_ops_v3',JSON.stringify(state));}
function dc(o){return JSON.parse(JSON.stringify(o));}
function uid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

// ── DRAG STATE ─────────────────────────────────────────────────────────────────
const drag={type:null,id:null,srcSection:null};

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render(){renderPinned();renderSections();}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function surl(url){try{const u=new URL(url);return(u.hostname+u.pathname).replace(/^www\./,'').slice(0,26).replace(/\/$/,'');}catch{return url.slice(0,26);}}

function renderPinned(){
  const g=document.getElementById('pinned-grid');
  g.innerHTML='';
  state.pinned.forEach(pin=>{
    const wrap=document.createElement('div');
    wrap.className='pin-group';
    const a=document.createElement('div');
    a.className='pin';
    a.innerHTML=`<span class="pin-dot" style="background:${esc(pin.color)}"></span>${esc(pin.label)}`;
    a.addEventListener('click',()=>window.open(pin.url,'_blank'));
    const btn=document.createElement('button');
    btn.className='pin-menu-btn';
    btn.textContent='⋮';
    btn.addEventListener('click',(e)=>{e.stopPropagation();showDD(e,[
      {label:'✎  Edit',action:()=>openModal('edit-pin',pin.id,null)},
      'sep',
      {label:'✕  Remove',danger:true,action:()=>{state.pinned=state.pinned.filter(p=>p.id!==pin.id);save();renderPinned();}}
    ]);});
    wrap.appendChild(a);wrap.appendChild(btn);
    g.appendChild(wrap);
  });
  const addBtn=document.createElement('div');
  addBtn.className='pin pin-add';
  addBtn.textContent='+';
  addBtn.addEventListener('click',()=>openModal('add-pin',null,null));
  g.appendChild(addBtn);
}

function renderSections(){
  const container=document.getElementById('sections-container');
  container.innerHTML='';
  const activeFilter=document.querySelector('.tab.active')?.dataset.filter||'all';
  state.sections.forEach(sec=>{
    if(activeFilter!=='all'&&sec.filter!==activeFilter)return;
    container.appendChild(buildSection(sec));
  });
  attachDrag();
}

function buildSection(sec){
  const wrap=document.createElement('div');
  wrap.className='section-wrap';
  wrap.dataset.sectionId=sec.id;

  // header
  const hdr=document.createElement('div');
  hdr.className='section-header';

  const handle=document.createElement('div');
  handle.className='section-drag-handle';
  handle.title='Drag to reorder section';
  handle.textContent='⠿';
  handle.draggable=true;
  handle.dataset.sectionId=sec.id;

  const lbl=document.createElement('span');
  lbl.className='sh-label'+(sec.priority?' pri':'');
  lbl.textContent=sec.label;

  const line=document.createElement('span');
  line.className='sh-line'+(sec.priority?' pri':'');

  const menuBtn=document.createElement('button');
  menuBtn.className='section-menu-btn';
  menuBtn.textContent='⋮';
  menuBtn.addEventListener('click',(e)=>{e.stopPropagation();showDD(e,[
    {label:'✎  Rename',action:()=>openModal('rename-sec',sec.id,null)},
    {label:'+  Add Site',action:()=>openModal('add-card',null,sec.id)},
    'sep',
    {label:'✕  Delete Section',danger:true,action:()=>{if(confirm('Delete section "'+sec.label+'" and all its sites?')){state.sections=state.sections.filter(s=>s.id!==sec.id);save();renderSections();}}}
  ]);});

  hdr.appendChild(handle);hdr.appendChild(lbl);hdr.appendChild(line);hdr.appendChild(menuBtn);

  // grid
  const grid=document.createElement('div');
  grid.className='section-grid';
  grid.dataset.sectionId=sec.id;

  sec.cards.forEach(card=>{grid.appendChild(buildCard(card,sec.id));});

  const addTile=document.createElement('div');
  addTile.className='add-card-tile';
  addTile.textContent='+';
  addTile.dataset.sectionId=sec.id;
  addTile.addEventListener('click',()=>openModal('add-card',null,sec.id));
  grid.appendChild(addTile);

  wrap.appendChild(hdr);
  wrap.appendChild(grid);
  return wrap;
}

function buildCard(card,secId){
  const div=document.createElement('div');
  div.className='card';
  div.dataset.cardId=card.id;
  div.dataset.secId=secId;
  div.draggable=true;
  div.style.setProperty('--c-accent',card.color||'#f97316');

  if(card.badge){
    const bdg=document.createElement('div');
    const bClass=card.badge==='live'?'b-live':card.badge==='fav'?'b-fav':'b-wip';
    bdg.className='card-badge '+bClass;
    bdg.textContent=card.badge.toUpperCase();
    div.appendChild(bdg);
  }

  const icon=document.createElement('div');
  icon.className='card-icon';
  icon.style.color=card.color||'#f97316';
  icon.textContent=card.icon||'◈';

  const lbl=document.createElement('div');
  lbl.className='card-label';
  lbl.textContent=card.label;

  const url=document.createElement('div');
  url.className='card-url-txt';
  url.textContent=surl(card.url);

  div.appendChild(icon);div.appendChild(lbl);div.appendChild(url);

  const menuBtn=document.createElement('button');
  menuBtn.className='card-menu-btn';
  menuBtn.textContent='⋮';
  menuBtn.addEventListener('click',(e)=>{
    e.stopPropagation();
    showDD(e,[
      {label:'✎  Edit',action:()=>openModal('edit-card',card.id,secId)},
      'sep',
      {label:'✕  Remove',danger:true,action:()=>{const s=state.sections.find(x=>x.id===secId);if(s){s.cards=s.cards.filter(c=>c.id!==card.id);save();renderSections();}}}
    ]);
  });
  div.appendChild(menuBtn);

  div.addEventListener('click',(e)=>{if(e.target.closest('.card-menu-btn'))return;window.open(card.url,'_blank');});
  return div;
}

// ── DRAG & DROP ────────────────────────────────────────────────────────────────
function attachDrag(){
  // Card drag
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('dragstart',onCardDragStart);
    card.addEventListener('dragend',onDragEnd);
  });
  // Section handle drag
  document.querySelectorAll('.section-drag-handle').forEach(handle=>{
    handle.addEventListener('dragstart',onSectionDragStart);
    handle.addEventListener('dragend',onDragEnd);
  });
  // Grid drop targets
  document.querySelectorAll('.section-grid').forEach(grid=>{
    grid.addEventListener('dragover',onGridOver);
    grid.addEventListener('drop',onGridDrop);
  });
  // Section container drop target
  const container=document.getElementById('sections-container');
  container.addEventListener('dragover',onSectionOver);
  container.addEventListener('drop',onSectionDrop);
}

function onCardDragStart(e){
  e.stopPropagation();
  drag.type='card';drag.id=this.dataset.cardId;drag.srcSection=this.dataset.secId;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',drag.id);
  setTimeout(()=>this.classList.add('dragging'),0);
}
function onSectionDragStart(e){
  e.stopPropagation();
  drag.type='section';drag.id=this.dataset.sectionId;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',drag.id);
  setTimeout(()=>{const w=document.querySelector(`.section-wrap[data-section-id="${drag.id}"]`);if(w)w.classList.add('section-dragging');},0);
}
function onDragEnd(){
  removeSlot();
  document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.section-dragging').forEach(el=>el.classList.remove('section-dragging'));
  drag.type=null;drag.id=null;drag.srcSection=null;
}

function getAfterEl(container,y){
  const els=[...container.querySelectorAll('.card:not(.dragging)')];
  return els.reduce((closest,child)=>{
    const box=child.getBoundingClientRect();
    const off=y-box.top-box.height/2;
    return(off<0&&off>closest.off)?{off,el:child}:closest;
  },{off:Number.NEGATIVE_INFINITY,el:null}).el;
}

function onGridOver(e){
  if(drag.type!=='card')return;
  e.preventDefault();e.stopPropagation();
  removeSlot();
  const slot=document.createElement('div');
  slot.className='card-drop-slot';slot.id='drop-slot';
  const after=getAfterEl(this,e.clientY);
  if(after)this.insertBefore(slot,after);
  else{const tile=this.querySelector('.add-card-tile');tile?this.insertBefore(slot,tile):this.appendChild(slot);}
}
function onGridDrop(e){
  if(drag.type!=='card')return;
  e.preventDefault();e.stopPropagation();
  const targetSecId=this.dataset.sectionId;
  const slot=document.getElementById('drop-slot');
  let insertIdx=0;
  if(slot){[...this.children].some((c,i)=>{if(c===slot){insertIdx=i;return true;}if(c.classList.contains('card'))return false;});}
  // Count only cards before slot
  let cardsBefore=0;
  [...this.children].some(c=>{if(c===slot)return true;if(c.classList.contains('card'))cardsBefore++;});
  insertIdx=cardsBefore;
  removeSlot();
  const srcSec=state.sections.find(s=>s.id===drag.srcSection);
  if(!srcSec)return;
  const srcIdx=srcSec.cards.findIndex(c=>c.id===drag.id);
  if(srcIdx===-1)return;
  const [cardData]=srcSec.cards.splice(srcIdx,1);
  const tgtSec=state.sections.find(s=>s.id===targetSecId);
  if(!tgtSec)return;
  if(drag.srcSection===targetSecId&&srcIdx<insertIdx)insertIdx--;
  tgtSec.cards.splice(Math.max(0,insertIdx),0,cardData);
  save();renderSections();
}

function onSectionOver(e){
  if(drag.type!=='section')return;
  e.preventDefault();
  removeSlot();
  const slot=document.createElement('div');
  slot.className='section-drop-slot';slot.id='drop-slot';
  const wraps=[...this.querySelectorAll('.section-wrap:not(.section-dragging)')];
  let inserted=false;
  for(const w of wraps){
    const r=w.getBoundingClientRect();
    if(e.clientY<r.top+r.height/2){this.insertBefore(slot,w);inserted=true;break;}
  }
  if(!inserted)this.appendChild(slot);
}
function onSectionDrop(e){
  if(drag.type!=='section')return;
  e.preventDefault();
  const slot=document.getElementById('drop-slot');
  if(!slot)return;
  const container=document.getElementById('sections-container');
  let before=0;
  [...container.children].some(c=>{if(c===slot)return true;if(c.classList.contains('section-wrap'))before++;});
  const srcIdx=state.sections.findIndex(s=>s.id===drag.id);
  if(srcIdx===-1){removeSlot();return;}
  let tgtIdx=before;
  if(srcIdx<tgtIdx)tgtIdx--;
  const[sec]=state.sections.splice(srcIdx,1);
  state.sections.splice(Math.max(0,tgtIdx),0,sec);
  removeSlot();save();renderSections();
}
function removeSlot(){const s=document.getElementById('drop-slot');if(s)s.remove();}

// ── DROPDOWN ──────────────────────────────────────────────────────────────────
const $dd=document.getElementById('dropdown');
function showDD(e,items){
  e.stopPropagation();
  $dd.innerHTML='';
  items.forEach(item=>{
    if(item==='sep'){const s=document.createElement('div');s.className='dd-sep';$dd.appendChild(s);return;}
    const btn=document.createElement('button');
    btn.className='dd-item'+(item.danger?' danger':'');
    btn.textContent=item.label;
    btn.addEventListener('click',()=>{closeDD();item.action();});
    $dd.appendChild(btn);
  });
  $dd.classList.remove('hidden');
  const x=Math.min(e.clientX,window.innerWidth-175);
  const y=Math.min(e.clientY+4,window.innerHeight-$dd.offsetHeight-10);
  $dd.style.left=x+'px';$dd.style.top=y+'px';
}
function closeDD(){$dd.classList.add('hidden');}
document.addEventListener('click',e=>{if(!$dd.contains(e.target))closeDD();});

// ── MODAL ──────────────────────────────────────────────────────────────────────
let mCtx={mode:null,tid:null,sid:null,icon:'◈'};
function openModal(mode,tid,sid){
  mCtx={mode,tid,sid,icon:'◈'};
  const isSecRename=mode==='rename-sec';
  document.getElementById('url-field').style.display=isSecRename?'none':'';
  document.getElementById('color-icon-row').style.display=isSecRename?'none':'';
  document.getElementById('icon-field').style.display=isSecRename?'none':'';
  document.getElementById('m-label').value='';
  document.getElementById('m-url').value='';
  document.getElementById('m-color').value='#f97316';
  mCtx.icon='◈';refreshIconSel();
  const titles={
    'add-card':'Add Site','edit-card':'Edit Site',
    'rename-sec':'Rename Section',
    'add-pin':'Add Pinned Site','edit-pin':'Edit Pinned Site'
  };
  document.getElementById('modal-title').textContent=titles[mode]||'Edit';
  if(mode==='edit-card'){
    const sec=state.sections.find(s=>s.id===sid);
    const card=sec?.cards.find(c=>c.id===tid);
    if(card){document.getElementById('m-label').value=card.label;document.getElementById('m-url').value=card.url;document.getElementById('m-color').value=card.color||'#f97316';mCtx.icon=card.icon||'◈';refreshIconSel();}
  }else if(mode==='rename-sec'){
    const sec=state.sections.find(s=>s.id===tid);
    if(sec)document.getElementById('m-label').value=sec.label;
  }else if(mode==='edit-pin'){
    const pin=state.pinned.find(p=>p.id===tid);
    if(pin){document.getElementById('m-label').value=pin.label;document.getElementById('m-url').value=pin.url;document.getElementById('m-color').value=pin.color||'#f97316';}
  }
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('m-label').focus(),50);
}
function closeModal(){document.getElementById('modal').classList.add('hidden');document.getElementById('modal-overlay').classList.add('hidden');}
function saveModal(){
  const label=document.getElementById('m-label').value.trim();
  const url=document.getElementById('m-url').value.trim();
  const color=document.getElementById('m-color').value;
  const{mode,tid,sid}=mCtx;
  if(!label)return;
  if(mode==='add-card'){
    if(!url)return;
    const sec=state.sections.find(s=>s.id===sid);
    if(sec){sec.cards.push({id:uid(),label,url,color,icon:mCtx.icon});save();renderSections();}
  }else if(mode==='edit-card'){
    const sec=state.sections.find(s=>s.id===sid);
    const card=sec?.cards.find(c=>c.id===tid);
    if(card){card.label=label;card.url=url;card.color=color;card.icon=mCtx.icon;save();renderSections();}
  }else if(mode==='rename-sec'){
    const sec=state.sections.find(s=>s.id===tid);
    if(sec){sec.label=label;save();renderSections();}
  }else if(mode==='add-pin'){
    if(!url)return;
    state.pinned.push({id:uid(),label,url,color});save();renderPinned();
  }else if(mode==='edit-pin'){
    const pin=state.pinned.find(p=>p.id===tid);
    if(pin){pin.label=label;pin.url=url;pin.color=color;save();renderPinned();}
  }
  closeModal();
}
function refreshIconSel(){
  document.getElementById('m-icon-display').textContent=mCtx.icon;
  document.querySelectorAll('.icon-opt').forEach(o=>o.classList.toggle('sel',o.dataset.icon===mCtx.icon));
}
function buildIconGrid(){
  const g=document.getElementById('icon-grid');
  ICONS.forEach(ic=>{
    const d=document.createElement('div');
    d.className='icon-opt';d.dataset.icon=ic;d.textContent=ic;
    d.addEventListener('click',()=>{mCtx.icon=ic;refreshIconSel();});
    g.appendChild(d);
  });
}
document.getElementById('modal-cancel').addEventListener('click',closeModal);
document.getElementById('modal-overlay').addEventListener('click',closeModal);
document.getElementById('modal-save').addEventListener('click',saveModal);
document.getElementById('m-label').addEventListener('keydown',e=>{if(e.key==='Enter')saveModal();});

// ── ADD SECTION ────────────────────────────────────────────────────────────────
document.getElementById('add-section-btn').addEventListener('click',()=>{
  const label=prompt('New section name:');
  if(!label?.trim())return;
  state.sections.push({id:uid(),label:label.trim(),filter:'custom',priority:false,cards:[]});
  save();renderSections();
});

// ── TABS ───────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    renderSections();
  });
});

// ── CLOCK ──────────────────────────────────────────────────────────────────────
function tick(){
  const n=new Date(),p=v=>String(v).padStart(2,'0');
  const D=['SUN','MON','TUE','WED','THU','FRI','SAT'],M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('clk').textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('clk-date').textContent=`${D[n.getDay()]} · ${M[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
}

// ── SEARCH / KEYBOARD ──────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('srch').focus();}
  if(e.key==='Escape'){closeModal();closeDD();if(document.activeElement.tagName==='INPUT')document.activeElement.blur();}
});

// ── RESET ──────────────────────────────────────────────────────────────────────
window.resetDashboard=()=>{
  if(confirm('Reset everything to defaults? Cannot be undone.')){
    localStorage.removeItem('aeon_ops_v3');
    state=dc(DEFAULT_DATA);save();render();
  }
};

// ── INIT ───────────────────────────────────────────────────────────────────────
loadState();buildIconGrid();render();tick();setInterval(tick,1000);
</script>
